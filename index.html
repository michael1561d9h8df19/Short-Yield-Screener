<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Alpha Terminal</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --text: #e0e0e0; --amber: #ffb400; --green: #00ff41; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .terminal-container { max-width: 1200px; margin: 0 auto; }
        h2 { color: var(--amber); border-bottom: 1px solid var(--border); padding-bottom: 10px; font-size: 1.2rem; text-transform: uppercase; }
        
        /* Layout */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 4px; }
        
        /* UI Elements */
        input { background: #000; border: 1px solid var(--border); color: var(--green); padding: 10px; width: calc(100% - 22px); margin-bottom: 10px; outline: none; }
        button { background: #1e1e1e; border: 1px solid var(--border); color: var(--green); padding: 8px 15px; cursor: pointer; transition: 0.2s; font-size: 12px; margin-right: 5px; }
        button:hover { background: var(--green); color: #000; }
        
        .sec-card { background: #000; border-left: 3px solid var(--amber); padding: 10px; margin-top: 10px; font-size: 12px; }
        .news-item { margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; font-size: 11px; line-height: 1.4; }
        
        /* Modal */
        .hidden { display: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="overlay" class="hidden">
        <div class="panel">
            <h3>ENTER API KEY</h3>
            <input type="password" id="keyInput" placeholder="Paste Gemini Key...">
            <button onclick="saveKey()">CONNECT</button>
        </div>
    </div>

    <div class="terminal-container">
        <section id="yield-zone" class="panel" style="margin-bottom:20px;">
            <h2>📉 Fixed Income Terminal</h2>
            <div style="margin-bottom:15px;">
                <button onclick="qs('Yield Curve Summary')">📈 Yield Curve</button>
                <button onclick="qs('SPSB vs MUB Relative Value')">⚖️ Corp vs Muni</button>
                <button onclick="qs('Top Short Term Muni ETFs')">🏥 Muni Screen</button>
            </div>
            <input type="text" id="qi" placeholder="Enter Ticker or Command (e.g. 10Y vs 2Y Spread)...">
            <button onclick="go()">EXECUTE CREDIT CHECK</button>
            <div id="results" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;"></div>
        </section>

        <div class="dashboard-grid">
            <div class="panel">
                <h2>🏢 Equity Workstation</h2>
                <input type="text" id="eqInput" placeholder="Enter Stock Ticker (e.g. NVDA, AAPL)...">
                <button onclick="runEquityScreen()">ANALYZE EQUITY</button>
                <div style="margin-top:20px;">
                    <canvas id="equityChart"></canvas>
                </div>
            </div>

            <div class="panel" style="max-height: 500px; overflow-y: auto;">
                <h2>📰 Global Macro News Feed</h2>
                <div id="news-content">Loading live headlines...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
