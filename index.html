<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Alpha Terminal | April 2026</title>
    <style>
        :root { --bg: #0a0a0a; --panel: #141414; --text: #e0e0e0; --amber: #ffb400; --green: #00ff41; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .terminal-container { max-width: 1200px; margin: 0 auto; }
        h2 { color: var(--amber); border-bottom: 1px solid var(--border); padding-bottom: 10px; font-size: 1.2rem; text-transform: uppercase; margin-top: 0; }
        
        /* Dashboard Layout */
        .dashboard-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; margin-bottom: 40px; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 4px; position: relative; }
        
        /* UI Components */
        input { background: #000; border: 1px solid var(--border); color: var(--green); padding: 12px; width: calc(100% - 26px); margin-bottom: 15px; outline: none; font-family: inherit; }
        button { background: #1e1e1e; border: 1px solid var(--border); color: var(--green); padding: 10px 20px; cursor: pointer; transition: 0.2s; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        button:hover { background: var(--green); color: #000; }
        
        .sec-card { background: #000; border-left: 3px solid var(--amber); padding: 15px; margin-top: 10px; font-size: 12px; border-radius: 2px; }
        .news-item { margin-bottom: 18px; border-bottom: 1px solid #222; padding-bottom: 12px; font-size: 11px; line-height: 1.5; color: #bbb; }
        .news-item strong { color: var(--green); display: block; margin-bottom: 4px; }
        
        /* Modal Overlay */
        .hidden { display: none !important; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: var(--panel); padding: 40px; border: 1px solid var(--border); text-align: center; min-width: 350px; }
        
        #status-bar { font-size: 10px; color: #666; margin-bottom: 20px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div id="overlay" class="hidden">
        <div class="modal-box">
            <h3 style="color:var(--text); margin-top:0;">ENTER API KEY</h3>
            <p style="font-size:10px; color:#888; margin-bottom:20px;">KEY IS STORED LOCALLY IN BROWSER ONLY</p>
            <input type="password" id="keyInput" placeholder="Paste Gemini Key here...">
            <br>
            <button onclick="saveKey()">CONNECT TERMINAL</button>
        </div>
    </div>

    <div class="terminal-container">
        <div id="status-bar">
            <span>SYSTEM: ONLINE</span>
            <span>DATE: APRIL 10, 2026</span>
            <span id="key-status" style="color:var(--green)">KEY: DETECTED</span>
        </div>

        <section class="panel" style="margin-bottom:20px;">
            <h2>📉 Fixed Income Terminal</h2>
            <div style="margin-bottom:15px; display:flex; gap:10px;">
                <button onclick="qs('Yield Curve Summary')">📈 Yield Curve</button>
                <button onclick="qs('SPSB vs MUB Relative Value')">⚖️ Corp vs Muni</button>
                <button onclick="qs('Top Short Term Muni ETFs')">🏥 Muni Screen</button>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="qi" placeholder="Command (e.g. 'Compare 2yr vs 10yr spread')..." style="margin-bottom:0;">
                <button onclick="go()" style="flex-shrink:0;">EXECUTE</button>
            </div>
            <div id="results" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;"></div>
        </section>

        <div class="dashboard-grid">
            <div class="panel">
                <h2>🏢 Equity Workstation</h2>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="eqInput" placeholder="Enter Ticker (NVDA, AAPL)..." style="margin-bottom:0;">
                    <button onclick="runEquityScreen()">ANALYZE</button>
                </div>
                <div style="margin-top:25px; height: 300px;">
                    <canvas id="equityChart"></canvas>
                </div>
            </div>

            <div class="panel" style="max-height: 500px; overflow-y: auto;">
                <h2>📰 Global Macro News</h2>
                <div id="news-content">Initialising news stream...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
