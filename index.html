<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="brand">
                <div class="brand-mark">IS</div>
                <span class="brand-name">Terminal</span>
            </div>
            <div class="topbar-right">
                <div class="status-group">
                    <div class="status-dot" id="statusDot"></div>
                    <span class="status-label" id="statusLabel">OFFLINE</span>
                </div>
                <button class="key-btn" onclick="openModal()">⚙ API Key</button>
            </div>
        </div>

        <div class="workspace">
            <div class="sidebar">
                <div class="s-label">Quick Screens</div>
                <div class="quick-list">
                    <button class="qs-btn" onclick="qs('Short-term Treasury yields and T-bill ETFs')">⚡ Treasuries</button>
                    <button class="qs-btn" onclick="qs('High dividend yield Blue Chip stocks')">📈 Dividends</button>
                </div>
            </div>

            <div class="main">
                <div class="query-bar">
                    <div class="q-wrap">
                        <input type="text" id="qi" placeholder="Search markets..." onkeydown="if(event.key==='Enter')go()">
                    </div>
                    <button class="run-btn" id="runBtn" onclick="go()">Screen</button>
                </div>
                <div class="results" id="results">
                    <div class="welcome">
                        <h1>Terminal Ready</h1>
                        <p>Click the gear icon to add your Gemini API Key.</p>
                    </div>
                </div>
            </div>

            <div class="watchlist-panel">
                <div class="s-label">Pinned</div>
                <div id="watchlistItems"></div>
            </div>
        </div>
    </div>

    <div class="overlay hidden" id="overlay">
        <div class="modal">
            <h3>API Configuration</h3>
            <p style="font-size:12px; color:gray; margin:10px 0;">Paste your Gemini key below:</p>
            <input type="password" id="keyInput" placeholder="AIzaSy...">
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="run-btn" onclick="saveKey()">Save Key</button>
                <button class="key-btn" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
